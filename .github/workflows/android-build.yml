name: Android Build

on:
  workflow_dispatch:
  push:
    branches: [ master ]
    paths:
      - 'android/**'
      - '.github/workflows/android-build.yml'
  pull_request:
    branches: [ master ]
    paths:
      - 'android/**'
      - '.github/workflows/android-build.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Accept SDK Licenses
      run: yes | sdkmanager --licenses || true
      shell: bash
    
    - name: Install Gradle and generate wrapper
      run: |
        wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip
        unzip -q gradle-8.2-bin.zip
        export PATH=$PWD/gradle-8.2/bin:$PATH
        gradle --version
        cd android
        gradle wrapper --gradle-version 8.2
        ls -la gradlew
      shell: bash
    
    - name: Make gradlew executable
      run: chmod +x ./android/gradlew
      shell: bash
    
    - name: Build Release APK (unsigned)
      working-directory: ./android
      run: ./gradlew assembleRelease --stacktrace
    
    - name: Find APK files
      run: |
        echo "=== All APK files ==="
        find android -name "*.apk" -type f 2>/dev/null || echo "No APK found"
        echo "=== Build outputs ==="
        ls -laR android/app/build/outputs/apk/ 2>/dev/null || echo "No outputs"
      shell: bash
    
    - name: Upload APK Artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: android/app/build/outputs/apk/release/*.apk
        retention-days: 30
        if-no-files-found: warn
