name: Android Build

on:
  push:
    branches: [ master ]
    paths:
      - 'android/**'
      - '.github/workflows/android-build.yml'
  pull_request:
    branches: [ master ]
    paths:
      - 'android/**'
      - '.github/workflows/android-build.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Accept SDK Licenses
      run: yes | sdkmanager --licenses || true
      shell: bash
    
    - name: Decode Keystore from Secret
      run: |
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/autodial-release.p12
        ls -la android/app/autodial-release.p12
      shell: bash

    - name: Fix PKCS12 Tag count (openssl repackage)
      working-directory: ./android/app
      run: |
        # keytool 生成的 PKCS12 含 >30 个 Tag，Android Gradle Plugin 不支持
        # 用 openssl 重新打包，生成干净的文件（Tag 数量极少）
        openssl pkcs12 -in autodial-release.p12 \
          -passin pass:"$KEY_STORE_PASSWORD" \
          -nokeys -out cert.pem 2>/dev/null
        openssl pkcs12 -in autodial-release.p12 \
          -passin pass:"$KEY_STORE_PASSWORD" \
          -nocerts -nodes -out key.pem 2>/dev/null
        openssl pkcs12 -export \
          -in cert.pem \
          -inkey key.pem \
          -name "$KEY_ALIAS" \
          -out autodial-release-clean.p12 \
          -passout pass:"$KEY_STORE_PASSWORD"
        mv autodial-release-clean.p12 autodial-release.p12
        rm -f cert.pem key.pem
        echo "=== Repackaged PKCS12 info ==="
        openssl pkcs12 -in autodial-release.p12 -passin pass:"$KEY_STORE_PASSWORD" -info -noout 2>&1 | head -20
      shell: bash
      env:
        KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}

    - name: Install Gradle and generate wrapper
      run: |
        wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip
        unzip -q gradle-8.2-bin.zip
        export PATH=$PWD/gradle-8.2/bin:$PATH
        gradle --version
        cd android
        gradle wrapper --gradle-version 8.2
        ls -la gradlew
      shell: bash
    
    - name: Build Release APK
      working-directory: ./android
      run: ./gradlew assembleRelease --stacktrace
      env:
        KEY_STORE_FILE: autodial-release.p12
        KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
    
    - name: Find APK files
      run: |
        echo "=== All APK files ==="
        find android -name "*.apk" -type f 2>/dev/null || echo "No APK found"
        echo "=== Build outputs ==="
        ls -laR android/app/build/outputs/apk/ 2>/dev/null || echo "No outputs"
      shell: bash
    
    - name: Upload APK Artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: android/app/build/outputs/apk/release/*.apk
        retention-days: 30
        if-no-files-found: warn
