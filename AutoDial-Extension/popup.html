<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutoDial</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 320px;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #0D0F14;
      color: #E8DCC8;
      padding: 0;
      overflow: hidden;
    }

    /* 顶部状态线 */
    .status-line {
      height: 3px;
      background: #EF4444;
      transition: background 0.4s, box-shadow 0.4s;
    }
    .status-line.connected {
      background: #22C55E;
      box-shadow: 0 0 8px rgba(34,197,94,0.6);
    }
    .status-line.connecting {
      background: linear-gradient(90deg, #F59E0B, #FBBF24, #F59E0B);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* 头部 */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      background: #161920;
    }
    .logo-icon {
      width: 28px; height: 28px;
      background: linear-gradient(135deg, #4F8EF7, #2563EB);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 10px rgba(79,142,247,0.35);
      flex-shrink: 0;
    }
    .logo-icon svg { width: 16px; height: 16px; }
    .header-text { flex: 1; }
    .header-title {
      font-size: 15px;
      font-weight: 700;
      color: #4F8EF7;
      letter-spacing: 0.5px;
    }
    .header-sub {
      font-size: 10px;
      color: #A09070;
      margin-top: 1px;
    }
    .refresh-btn {
      width: 28px; height: 28px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: all 0.15s;
      color: #A09070;
      flex-shrink: 0;
    }
    .refresh-btn:hover { background: rgba(79,142,247,0.12); border-color: rgba(79,142,247,0.4); color: #4F8EF7; }
    .refresh-btn.spinning svg { animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* 状态卡片 */
    .status-card {
      margin: 12px 12px 0;
      background: #161920;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 12px;
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: border-color 0.3s;
    }
    .status-card.connected { border-color: rgba(34,197,94,0.3); }
    .status-card.error { border-color: rgba(239,68,68,0.3); }
    .status-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #EF4444;
      flex-shrink: 0;
      transition: background 0.3s, box-shadow 0.3s;
    }
    .status-dot.connected {
      background: #22C55E;
      box-shadow: 0 0 8px rgba(34,197,94,0.7);
      animation: pulse 2s infinite;
    }
    .status-dot.connecting {
      background: #F59E0B;
      box-shadow: 0 0 6px rgba(245,158,11,0.7);
      animation: pulse 1s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .status-text {
      flex: 1;
      font-size: 13px;
      color: #A09070;
      font-weight: 500;
    }
    .status-text.connected { color: #22C55E; }
    .status-text.error { color: #EF4444; }

    /* 信息网格 */
    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin: 10px 12px 0;
    }
    .info-cell {
      background: #161920;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 10px;
      padding: 10px 12px;
    }
    .info-cell.full { grid-column: 1 / -1; }
    .info-label {
      font-size: 9px;
      color: #605040;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .info-value {
      font-size: 16px;
      font-weight: 700;
      color: #4F8EF7;
      font-variant-numeric: tabular-nums;
      letter-spacing: 2px;
    }
    .info-value.normal { font-size: 12px; color: #E8DCC8; letter-spacing: 0.5px; font-weight: 500; }
    .info-value.ok { color: #22C55E; font-size: 12px; letter-spacing: 0; font-weight: 600; }
    .info-value.fail { color: #EF4444; font-size: 12px; letter-spacing: 0; font-weight: 600; }

    /* 手机列表 */
    .phone-list {
      margin: 10px 12px 0;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .phone-item {
      background: #161920;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 10px;
      padding: 8px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .phone-item-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #22C55E;
      box-shadow: 0 0 5px rgba(34,197,94,0.6);
      flex-shrink: 0;
    }
    .phone-item-name {
      flex: 1;
      font-size: 12px;
      color: #E8DCC8;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .phone-item-badge {
      font-size: 9px;
      padding: 2px 6px;
      border-radius: 4px;
      font-weight: 600;
      letter-spacing: 0.5px;
      flex-shrink: 0;
    }
    .badge-lan { background: rgba(34,197,94,0.15); color: #22C55E; border: 1px solid rgba(34,197,94,0.3); }
    .badge-cloud { background: rgba(79,142,247,0.15); color: #4F8EF7; border: 1px solid rgba(79,142,247,0.3); }

    /* 使用说明 */
    .hint-card {
      margin: 10px 12px 0;
      background: rgba(79,142,247,0.06);
      border: 1px solid rgba(79,142,247,0.18);
      border-radius: 10px;
      padding: 10px 12px;
    }
    .hint-title {
      font-size: 10px;
      color: #4F8EF7;
      font-weight: 600;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .hint-steps {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .hint-step {
      display: flex;
      align-items: flex-start;
      gap: 7px;
      font-size: 11px;
      color: #A09070;
      line-height: 1.5;
    }
    .hint-step-num {
      width: 16px; height: 16px;
      background: rgba(79,142,247,0.15);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 9px;
      color: #4F8EF7;
      font-weight: 700;
      flex-shrink: 0;
      margin-top: 1px;
    }

    /* 底部 */
    .footer {
      margin: 10px 12px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .footer-version {
      font-size: 10px;
      color: #3A3A4A;
    }
    .footer-link {
      font-size: 10px;
      color: #4F8EF7;
      cursor: pointer;
      opacity: 0.7;
      transition: opacity 0.15s;
    }
    .footer-link:hover { opacity: 1; }
  </style>
</head>
<body>
  <div class="status-line connecting" id="statusLine"></div>

  <div class="header">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.4 2 2 0 0 1 3.6 1.22h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.8a16 16 0 0 0 6.29 6.29l.95-.95a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
      </svg>
    </div>
    <div class="header-text">
      <div class="header-title">AutoDial</div>
      <div class="header-sub">一键拨号系统</div>
    </div>
    <div class="refresh-btn" id="refreshBtn" title="刷新状态">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.5"/>
      </svg>
    </div>
  </div>

  <div class="status-card connecting" id="statusCard">
    <div class="status-dot connecting" id="statusDot"></div>
    <span class="status-text" id="statusText">正在连接 PC 端...</span>
  </div>

  <div class="info-grid">
    <div class="info-cell">
      <div class="info-label">本机 IP</div>
      <div class="info-value" id="localIP" style="font-size:13px;letter-spacing:0.5px;">--</div>
    </div>
    <div class="info-cell">
      <div class="info-label">配对码</div>
      <div class="info-value" id="pinCode">----</div>
    </div>
    <div class="info-cell full">
      <div class="info-label">手机连接</div>
      <div class="info-value normal" id="phoneStatus">--</div>
    </div>
  </div>

  <div class="phone-list" id="phoneList"></div>

  <div class="hint-card">
    <div class="hint-title">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      使用说明
    </div>
    <div class="hint-steps">
      <div class="hint-step">
        <div class="hint-step-num">1</div>
        <span>确保 AutoDial PC 端已运行</span>
      </div>
      <div class="hint-step">
        <div class="hint-step-num">2</div>
        <span>手机端输入配对码连接</span>
      </div>
      <div class="hint-step">
        <div class="hint-step-num">3</div>
        <span>打开 CRM，悬浮按钮自动出现</span>
      </div>
    </div>
  </div>

  <div class="footer">
    <span class="footer-version">v2.1.0</span>
    <span class="footer-link" id="openDesktop">打开主界面 →</span>
  </div>

  <!-- 快速拨号区 -->
  <div style="margin: 0 12px 14px; display: flex; gap: 6px; align-items: center;">
    <input type="tel" id="quickDialInput"
      placeholder="输入号码快速拨打..."
      style="flex:1; background:#161920; border:1.5px solid rgba(255,255,255,0.08);
             border-radius:10px; padding:8px 12px; color:#E8DCC8; font-size:13px;
             font-weight:600; outline:none; font-variant-numeric:tabular-nums;
             letter-spacing:0.5px; transition:border-color 0.15s;"
      onfocus="this.style.borderColor='rgba(79,142,247,0.5)'"
      onblur="this.style.borderColor='rgba(255,255,255,0.08)'" />
    <button id="quickDialBtn"
      style="background:linear-gradient(135deg,#4F8EF7,#2563EB); border:none;
             border-radius:10px; padding:8px 14px; color:white; font-size:12px;
             font-weight:700; cursor:pointer; white-space:nowrap;
             box-shadow:0 2px 8px rgba(79,142,247,0.3); transition:all 0.15s;"
      onmouseover="this.style.filter='brightness(1.15)'"
      onmouseout="this.style.filter='none'">
      拨打
    </button>
    <button id="quickHangupBtn"
      style="background:linear-gradient(135deg,#DC2626,#B91C1C); border:none;
             border-radius:10px; padding:8px 10px; color:white; font-size:12px;
             font-weight:700; cursor:pointer; white-space:nowrap;
             box-shadow:0 2px 8px rgba(239,68,68,0.2); transition:all 0.15s;"
      onmouseover="this.style.filter='brightness(1.15)'"
      onmouseout="this.style.filter='none'">
      挂断
    </button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
