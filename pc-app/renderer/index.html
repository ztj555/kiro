<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoDial</title>
<style>
:root {
  --gold: #C9A84C;
  --gold-light: #F0C040;
  --gold-dark: #8B6914;
  --bg: #0D0F14;
  --bg2: #161920;
  --bg3: #1E2128;
  --text: #E8DCC8;
  --text2: #A09070;
  --green: #22C55E;
  --red: #EF4444;
  --blue: #4F8EF7;
  --blue-dark: #2563EB;
  --blue-glow: rgba(79,142,247,0.3);
  --surface: #161920;
  --surface2: #1E2128;
  --border: rgba(255,255,255,0.08);
  --border-active: rgba(79,142,247,0.4);
  --radius-sm: 6px;
  --radius-md: 12px;
  --radius-lg: 24px;
  --shadow: none;
  --font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
  --gradient-green: linear-gradient(135deg, #16A34A, #15803D);
  --gradient-red: linear-gradient(135deg, #DC2626, #B91C1C);
  --gradient-blue: linear-gradient(135deg, #4F8EF7, #2563EB);
  --glow-text: none;
  --floatbar-bg: rgba(22,25,32,0.85);
  --floatbar-border: rgba(79,142,247,0.25);
  --floatbar-blur: blur(20px);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-family);
  overflow: hidden;
  user-select: none;
}
.wrap { width: 100%; height: 100%; display: flex; flex-direction: column; }

/* ---- 顶部状态条 ---- */
.status-bar {
  height: 3px;
  background: var(--red);
  transition: background 0.4s, box-shadow 0.4s;
  flex-shrink: 0;
}
.status-bar.connecting { background: linear-gradient(90deg, #F59E0B, #FBBF24, #F59E0B); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
.status-bar.connected { background: var(--green); box-shadow: 0 0 8px rgba(34,197,94,0.5); }
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

/* ---- 标题栏 ---- */
.titlebar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0;
  display: flex;
  align-items: center;
  flex-shrink: 0;
  -webkit-app-region: drag;
  height: 36px;
}
.titlebar .logo {
  padding-left: 12px;
  font-size: 13px;
  font-weight: 700;
  color: var(--blue);
  letter-spacing: 1.5px;
  display: flex;
  align-items: center;
  gap: 7px;
  flex-shrink: 0;
}
.logo-icon {
  width: 20px; height: 20px;
  background: var(--gradient-blue);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px;
  box-shadow: 0 0 8px var(--blue-glow);
}
.titlebar-center {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  font-size: 11px;
  color: var(--text2);
  -webkit-app-region: drag;
}
.titlebar-btns {
  display: flex;
  margin-left: auto;
  height: 100%;
  -webkit-app-region: no-drag;
  gap: 0;
}
.titlebar-btn {
  width: 36px; height: 36px;
  background: none; border: none;
  color: var(--text2);
  font-size: 10px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s, color 0.15s;
  -webkit-app-region: no-drag;
  border-radius: 0;
}
.titlebar-btn:hover { background: rgba(255,255,255,0.07); color: var(--text); }
.titlebar-btn.close:hover { background: #C42B1C; color: white; }
.titlebar-btn.active { color: var(--blue); }
.titlebar-btn svg { pointer-events: none; }

/* ---- 状态信息行 ---- */
.status-row {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 6px 12px;
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
  min-height: 36px;
}
.status-indicator {
  display: flex;
  align-items: center;
  gap: 6px;
  flex: 1;
}
.status-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--red);
  flex-shrink: 0;
  transition: background 0.3s, box-shadow 0.3s;
}
.status-dot.connecting { background: #F59E0B; box-shadow: 0 0 6px rgba(245,158,11,0.6); animation: pulse 1s infinite; }
.status-dot.on { background: var(--green); box-shadow: 0 0 6px rgba(34,197,94,0.6); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.4} }
.status-text { font-size: 11px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 160px; }
.status-chips { display: flex; gap: 5px; }
.chip {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 2px 8px;
  text-align: center;
}
.chip .lbl { font-size: 8px; color: var(--text2); letter-spacing: 0.8px; text-transform: uppercase; }
.chip .val { font-size: 11px; font-weight: 700; color: var(--text); letter-spacing: 1px; font-variant-numeric: tabular-nums; }
.chip .val.ip { font-size: 10px; letter-spacing: 0.3px; }
.restart-icon {
  padding: 3px 5px; font-size: 12px; cursor: pointer;
  color: var(--text2); opacity: 0.6; transition: all 0.2s;
  line-height: 1; user-select: none; border-radius: 4px;
}
.restart-icon:hover { opacity: 1; color: var(--blue); background: rgba(79,142,247,0.1); }
.restart-icon.spinning { animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.topmost-switch {
  display: flex; align-items: center; gap: 3px;
  cursor: pointer; user-select: none; flex-shrink: 0;
}
.topmost-switch input { display: none; }
.topmost-switch .sw-track {
  width: 26px; height: 14px;
  background: var(--surface2);
  border-radius: 7px;
  position: relative;
  transition: background 0.2s;
  border: 1px solid var(--border);
}
.topmost-switch .sw-track::after {
  content: '';
  position: absolute;
  top: 2px; left: 2px;
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--text2);
  transition: all 0.2s;
}
.topmost-switch input:checked + .sw-track { background: var(--blue-dark); border-color: var(--blue); }
.topmost-switch input:checked + .sw-track::after { left: 14px; background: white; }
.topmost-switch .sw-label { font-size: 9px; color: var(--text2); }

/* ---- 手机设备卡片区 ---- */
.phone-section {
  display: none;
  flex-direction: column;
  gap: 4px;
  padding: 6px 10px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  max-height: 120px;
  overflow-y: auto;
}
.phone-section.show { display: flex; }
.phone-section::-webkit-scrollbar { width: 3px; }
.phone-section::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.phone-card {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 7px 10px;
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  transition: all 0.15s;
  border-left: 3px solid transparent;
}
.phone-card:hover { border-color: rgba(79,142,247,0.3); background: rgba(79,142,247,0.05); }
.phone-card.active { border-left-color: var(--blue); background: rgba(79,142,247,0.08); border-color: var(--border-active); }
.phone-card-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); flex-shrink: 0; box-shadow: 0 0 5px rgba(34,197,94,0.5); }
.phone-card-info { flex: 1; min-width: 0; }
.phone-card-name { font-size: 12px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.phone-card-meta { font-size: 10px; color: var(--text2); display: flex; gap: 6px; align-items: center; margin-top: 1px; }
.phone-badge {
  font-size: 9px; padding: 1px 5px;
  border-radius: 4px; font-weight: 600; letter-spacing: 0.5px;
}
.phone-badge.lan { background: rgba(34,197,94,0.15); color: var(--green); border: 1px solid rgba(34,197,94,0.3); }
.phone-badge.cloud { background: rgba(79,142,247,0.15); color: var(--blue); border: 1px solid rgba(79,142,247,0.3); }
.phone-badge.dual { background: rgba(245,158,11,0.15); color: #F59E0B; border: 1px solid rgba(245,158,11,0.3); }
.phone-reconnect-btn {
  display: inline-flex; align-items: center; justify-content: center;
  padding: 3px 8px;
  background: transparent; border: 1px solid var(--border); border-radius: 6px;
  color: var(--text2); font-size: 10px; cursor: pointer;
  transition: all 0.2s; flex-shrink: 0;
}
.phone-reconnect-btn:hover { border-color: var(--blue); color: var(--blue); background: rgba(79,142,247,0.08); }
.phone-reconnect-btn.spinning { color: var(--blue); border-color: var(--blue); pointer-events: none; }
.phone-rename-input {
  background: var(--surface);
  border: 1px solid var(--blue);
  border-radius: 6px;
  padding: 2px 8px;
  font-size: 11px;
  color: var(--text);
  outline: none;
  width: 110px;
}

/* ---- 连接成功横幅 ---- */
.banner {
  display: none;
  background: rgba(34,197,94,0.08);
  border-bottom: 1px solid rgba(34,197,94,0.2);
  padding: 5px 14px;
  text-align: center;
  font-size: 12px;
  font-weight: 600;
  color: var(--green);
  letter-spacing: 0.5px;
  flex-shrink: 0;
}
.banner.show { display: block; }

/* ---- 主内容区 ---- */
.body {
  flex: 1;
  padding: 8px 10px 6px;
  display: flex;
  flex-direction: column;
  gap: 7px;
  overflow-y: auto;
  overflow-x: hidden;
}
.body::-webkit-scrollbar { width: 3px; }
.body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* 号码输入框 */
.number-box {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-md);
  padding: 10px 12px 8px;
  flex-shrink: 0;
  transition: border-color 0.2s, box-shadow 0.2s;
  position: relative;
}
.number-box:focus-within {
  border-color: var(--border-active);
  box-shadow: 0 0 0 3px rgba(79,142,247,0.1);
}
.number-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 4px;
}
.number-lbl { font-size: 9px; color: var(--text2); letter-spacing: 1px; text-transform: uppercase; }
.clip-hint { font-size: 9px; color: var(--gold); display: flex; align-items: center; gap: 3px; }
.clip-hint.flash { animation: clipflash 0.5s ease; }
@keyframes clipflash { 0%,100%{color:var(--gold)} 50%{color:var(--gold-light); text-shadow: 0 0 8px var(--gold-light);} }
.number-input-row { display: flex; align-items: center; gap: 6px; }
.number-input {
  background: none; border: none; outline: none;
  font-size: 26px; font-weight: 700;
  color: var(--text); flex: 1;
  letter-spacing: 3px; caret-color: var(--blue);
  font-variant-numeric: tabular-nums;
}
.number-input::placeholder { color: rgba(160,144,112,0.4); font-size: 14px; font-weight: 400; letter-spacing: 1px; }
.number-clear-btn {
  width: 24px; height: 24px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 50%;
  color: var(--text2);
  font-size: 12px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
  flex-shrink: 0;
}
.number-clear-btn:hover { background: rgba(239,68,68,0.15); border-color: var(--red); color: var(--red); }

/* 拨号盘 */
.dialpad {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 5px;
  flex-shrink: 0;
}
.dial-btn {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 8px 0;
  cursor: pointer;
  transition: all 0.12s;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 1px;
}
.dial-btn:hover { background: var(--surface2); border-color: rgba(79,142,247,0.3); transform: scale(1.02); }
.dial-btn:active { transform: scale(0.94); background: rgba(79,142,247,0.1); border-color: var(--blue); }
.dial-btn .num { font-size: 18px; font-weight: 600; color: var(--text); line-height: 1; }
.dial-btn .sub { font-size: 7px; color: var(--text2); letter-spacing: 2px; text-transform: uppercase; }
.dial-btn.del .num { font-size: 16px; color: var(--red); }

/* 操作按钮 */
.action-row { display: flex; gap: 6px; flex-shrink: 0; }
.call-btn {
  flex: 1;
  padding: 11px;
  background: var(--gradient-blue);
  border: none; border-radius: var(--radius-md);
  color: white; font-size: 15px; font-weight: 700;
  cursor: pointer; transition: all 0.2s;
  display: flex; align-items: center; justify-content: center; gap: 7px;
  letter-spacing: 0.5px;
  box-shadow: 0 2px 12px rgba(79,142,247,0.2);
}
.call-btn:hover:not(:disabled) {
  filter: brightness(1.12);
  box-shadow: 0 4px 20px rgba(79,142,247,0.45);
  transform: translateY(-1px);
}
.call-btn:active:not(:disabled) { transform: translateY(0); }
.call-btn:disabled { background: var(--surface2); color: var(--text2); cursor: default; opacity: 0.7; font-size: 13px; box-shadow: none; }
.hangup-btn {
  flex: 1;
  padding: 11px;
  background: var(--gradient-red);
  border: none; border-radius: var(--radius-md);
  color: white; font-size: 15px; font-weight: 700;
  cursor: pointer; transition: all 0.2s;
  display: flex; align-items: center; justify-content: center; gap: 7px;
  letter-spacing: 0.5px;
  box-shadow: 0 2px 12px rgba(239,68,68,0.2);
}
.hangup-btn:hover:not(:disabled) {
  filter: brightness(1.12);
  box-shadow: 0 4px 20px rgba(239,68,68,0.45);
  transform: translateY(-1px);
}
.hangup-btn:active:not(:disabled) { transform: translateY(0); }
.hangup-btn:disabled { background: var(--surface2); color: var(--text2); cursor: default; opacity: 0.7; font-size: 13px; box-shadow: none; }

/* 短信按钮 */
.sms-row { flex-shrink: 0; }
.sms-btn {
  width: 100%;
  padding: 8px;
  background: none;
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  color: var(--text2);
  font-size: 13px;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.5px;
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.sms-btn:hover { background: rgba(79,142,247,0.08); border-color: var(--border-active); color: var(--blue); }

/* 模板标签 */
.index-tpl-list {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  margin-top: 5px;
}
.index-tpl-tag {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 3px 10px;
  font-size: 11px;
  color: var(--text2);
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
  max-width: 100%;
  overflow: hidden;
  text-overflow: ellipsis;
}
.index-tpl-tag:hover { border-color: var(--border-active); color: var(--blue); background: rgba(79,142,247,0.07); }
.index-tpl-tag:active { transform: scale(0.94); }

/* ---- 日志区 ---- */
.log-section { flex-shrink: 0; }
.log-toggle {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 5px 10px;
  background: var(--surface);
  border-radius: var(--radius-md);
  cursor: pointer;
  font-size: 11px;
  color: var(--text2);
  border: 1px solid var(--border);
  transition: border-color 0.2s;
}
.log-toggle:hover { border-color: rgba(79,142,247,0.3); }
.log-toggle .arrow { transition: transform 0.2s; font-size: 9px; }
.log-toggle.open .arrow { transform: rotate(180deg); }
.log-body {
  display: none;
  max-height: 120px;
  overflow-y: auto;
  padding: 5px 7px;
  gap: 3px;
  flex-direction: column;
  background: var(--surface);
  border-radius: 0 0 var(--radius-md) var(--radius-md);
  border: 1px solid var(--border);
  border-top: none;
  margin-top: -1px;
}
.log-body.open { display: flex; }
.log-body::-webkit-scrollbar { width: 3px; }
.log-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.log-entry {
  display: flex; align-items: baseline; gap: 6px;
  font-size: 11px; padding: 3px 6px;
  border-radius: 6px;
  background: var(--bg);
  border-left: 2px solid var(--border);
  animation: fadein 0.2s;
}
@keyframes fadein { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }
.log-entry.success { border-left-color: var(--green); }
.log-entry.error   { border-left-color: var(--red);   }
.log-entry.info    { border-left-color: var(--blue);  }
.log-entry .lt { color: var(--text2); flex-shrink: 0; font-size: 10px; font-variant-numeric: tabular-nums; }
.log-entry .lm { color: var(--text); }

/* Toast */
.toast {
  position: fixed; bottom: 12px; left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--radius-md); padding: 8px 18px;
  font-size: 12px; color: var(--text);
  transition: transform 0.25s; z-index: 999; white-space: nowrap;
  backdrop-filter: blur(12px);
}
.toast.show { transform: translateX(-50%) translateY(0); }
.toast.success { border-color: var(--green); color: var(--green); }
.toast.error   { border-color: var(--red);   color: var(--red);   }

</style>
<script src="../themes/theme-data.js"></script>
<script src="js/theme.js"></script>
</head>
<body>
<div class="wrap">
  <!-- 顶部彩色状态线 -->
  <div class="status-bar" id="statusBar"></div>

  <!-- 标题栏 -->
  <div class="titlebar">
    <div class="logo">
      <div class="logo-icon">&#x1F4DE;</div>AutoDial
    </div>
    <div class="titlebar-btns">
      <button class="titlebar-btn" id="btnSettings" title="设置">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
      </button>
      <button class="titlebar-btn" id="restartCloudIcon" title="重连云端">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/></svg>
      </button>
      <button class="titlebar-btn" id="restartAppIcon" title="重启软件">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.5"/></svg>
      </button>
      <label class="topmost-switch" title="窗口置顶" style="-webkit-app-region:no-drag;padding:0 4px;">
        <input type="checkbox" id="topmostToggle">
        <span class="sw-track"></span>
        <span class="sw-label">顶</span>
      </label>
      <label class="topmost-switch" title="悬浮横条" style="-webkit-app-region:no-drag;padding:0 4px;">
        <input type="checkbox" id="floatbarToggle" checked>
        <span class="sw-track"></span>
        <span class="sw-label">浮</span>
      </label>
      <button class="titlebar-btn" id="btnMinimize" title="最小化">
        <svg width="10" height="1" viewBox="0 0 10 1"><rect width="10" height="1" fill="currentColor"/></svg>
      </button>
      <button class="titlebar-btn close" id="btnClose" title="关闭">
        <svg width="10" height="10" viewBox="0 0 10 10"><line x1="0" y1="0" x2="10" y2="10" stroke="currentColor" stroke-width="1.2"/><line x1="10" y1="0" x2="0" y2="10" stroke="currentColor" stroke-width="1.2"/></svg>
      </button>
    </div>
  </div>

  <!-- 状态信息行 -->
  <div class="status-row">
    <div class="status-indicator">
      <div class="status-dot" id="statusDot"></div>
      <div class="status-text" id="statusText">等待手机连接...</div>
    </div>
    <div class="status-chips">
      <div class="chip"><div class="lbl">IP</div><div class="val ip" id="localIP">&#x2026;</div></div>
      <div class="chip"><div class="lbl">配对码</div><div class="val" id="pinCode">----</div></div>
    </div>
  </div>

  <!-- 连接成功横幅 -->
  <div class="banner" id="banner">&#x2705; 手机已连接，可以拨号</div>

  <!-- 手机设备卡片区 -->
  <div class="phone-section" id="phoneSelector">
    <div id="phoneList"></div>
  </div>

  <!-- 主体 -->
  <div class="body">
    <!-- 号码输入 -->
    <div class="number-box">
      <div class="number-row">
        <span class="number-lbl">&#x1F4F1; 号码</span>
        <span class="clip-hint" id="clipHint">&#x1F4CB; 已跟随剪贴板</span>
      </div>
      <div class="number-input-row">
        <input type="text" class="number-input" id="numberInput"
               placeholder="复制号码自动出现..." maxlength="20"
               inputmode="tel" autocomplete="off">
        <button class="number-clear-btn" id="btnClear" title="清除">&#x2715;</button>
      </div>
    </div>

    <!-- 拨号盘 -->
    <div class="dialpad">
      <button class="dial-btn" data-key="1"><span class="num">1</span></button>
      <button class="dial-btn" data-key="2"><span class="num">2</span><span class="sub">ABC</span></button>
      <button class="dial-btn" data-key="3"><span class="num">3</span><span class="sub">DEF</span></button>
      <button class="dial-btn" data-key="4"><span class="num">4</span><span class="sub">GHI</span></button>
      <button class="dial-btn" data-key="5"><span class="num">5</span><span class="sub">JKL</span></button>
      <button class="dial-btn" data-key="6"><span class="num">6</span><span class="sub">MNO</span></button>
      <button class="dial-btn" data-key="7"><span class="num">7</span><span class="sub">PQRS</span></button>
      <button class="dial-btn" data-key="8"><span class="num">8</span><span class="sub">TUV</span></button>
      <button class="dial-btn" data-key="9"><span class="num">9</span><span class="sub">WXYZ</span></button>
      <button class="dial-btn" data-key="*"><span class="num">&#x2731;</span></button>
      <button class="dial-btn" data-key="0"><span class="num">0</span><span class="sub">+</span></button>
      <button class="dial-btn del" data-key="del"><span class="num">&#x232B;</span></button>
    </div>

    <!-- 操作按钮 -->
    <div class="action-row">
      <button class="call-btn" id="callBtn" disabled>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.4 2 2 0 0 1 3.6 1.22h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.8a16 16 0 0 0 6.29 6.29l.95-.95a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
        拨号
      </button>
      <button class="hangup-btn" id="hangupBtn" disabled>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        挂断
      </button>
    </div>

    <!-- 短信 -->
    <div class="sms-row">
      <button class="sms-btn" id="smsBtn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        发短信
      </button>
      <div class="index-tpl-list" id="indexTplList"></div>
    </div>

    <!-- 日志 -->
    <div class="log-section">
      <div class="log-toggle" id="logToggle">
        <span>&#x1F4DD; 操作日志</span>
        <span class="arrow">&#x25BC;</span>
      </div>
      <div class="log-body" id="logBody"></div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
/* window.api 通过 preload.js contextBridge 注入 */
let isConnected = false;
let lastDialPin = null;
let activePin = null;
let lastClipboard = '';
let clipboardTimer = null;
let logOpen = false;
let currentPhones = [];
let currentActiveId = null;
let _dialCountdownId = null;  // 唤醒倒计时 timer（模块级，避免 DOM 属性存储）

// ==================== 标题栏按钮 ====================
document.getElementById('btnSettings').addEventListener('click', () => { window.api.send('open-settings'); });
document.getElementById('btnMinimize').addEventListener('click', () => { window.api.send('window-control', 'minimize'); });
document.getElementById('btnClose').addEventListener('click', () => { window.api.send('window-control', 'close'); });
document.getElementById('topmostToggle').addEventListener('change', function() { window.api.send('set-topmost', this.checked); });
document.getElementById('floatbarToggle').addEventListener('change', function() { window.api.send('toggle-floatbar', this.checked); });

// ==================== 拨号盘事件 ====================
document.querySelectorAll('.dial-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const key = btn.getAttribute('data-key');
    if (key === 'del') deleteLast(); else pressKey(key);
  });
});
document.getElementById('btnClear').addEventListener('click', clearNumber);
document.getElementById('callBtn').addEventListener('click', dial);
document.getElementById('hangupBtn').addEventListener('click', hangup);
document.getElementById('logToggle').addEventListener('click', toggleLog);
document.getElementById('smsBtn').addEventListener('click', () => {
  const number = document.getElementById('numberInput').value.trim().replace(/\s/g, '');
  window.api.send('open-sms', number || '');
});

// ==================== 按钮状态文字 ====================
function updateCallBtnText() {
  const btn = document.getElementById('callBtn');
  btn.style.pointerEvents = '';
  if (btn.disabled) {
    btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg> 请输入号码';
  } else if (!isConnected) {
    btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.5"/></svg> 重连手机';
  } else {
    btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.4 2 2 0 0 1 3.6 1.22h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.8a16 16 0 0 0 6.29 6.29l.95-.95a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg> 拨号';
  }
}
function updateHangupBtnText() {
  const btn = document.getElementById('hangupBtn');
  if (btn.disabled) {
    btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"/></svg> 请连接手机';
  } else {
    btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg> 挂断';
  }
}
const callBtn = document.getElementById('callBtn');
const hangupBtn = document.getElementById('hangupBtn');
new MutationObserver(updateCallBtnText).observe(callBtn, { attributes: true, attributeFilter: ['disabled'] });
new MutationObserver(updateHangupBtnText).observe(hangupBtn, { attributes: true, attributeFilter: ['disabled'] });
updateCallBtnText();
updateHangupBtnText();

document.getElementById('numberInput').addEventListener('input', function() {
  document.getElementById('callBtn').disabled = isConnected && !this.value.trim();
  updateCallBtnText();
});

// ==================== 状态条更新 ====================
function setStatusBar(state) {
  const bar = document.getElementById('statusBar');
  bar.className = 'status-bar ' + (state || '');
}

// ==================== 初始化 ====================
async function init() {
  let info = null;
  for (let i = 0; i < 5; i++) {
    try { info = await window.api.invoke('get-info'); break; }
    catch (e) { await new Promise(r => setTimeout(r, 500)); }
  }
  if (info) {
    document.getElementById('localIP').textContent = info.ip || '--';
    document.getElementById('pinCode').textContent = info.pin || '----';
    if (info.connected) setPhoneConnected(true, null);
    if (info.firewall === 'warning') addLog('error', '防火墙可能拦截连接，请以管理员运行');
  } else {
    document.getElementById('localIP').textContent = '获取失败';
  }
  pollClipboard();

  window.api.on('status-update', (data) => setPhoneConnected(data.connected, data.phoneIP));
  window.api.on('phones-update', (data) => {
    activePin = data.activeId;
    updatePhoneSelector(data.phones, data.activeId);
    updateCallBtnText();
  });
  window.api.on('force-reconnect-result', (data) => {
    document.getElementById('phoneList').querySelectorAll('.phone-reconnect-btn').forEach(btn => {
      btn.classList.remove('spinning');
      btn.textContent = '↺';
    });
    const callBtn = document.getElementById('callBtn');
    callBtn.style.pointerEvents = '';
    updateCallBtnText();
    if (!data.success) showToast(data.error || '唤醒手机失败', 'error');
  });
  window.api.on('info-push', (data) => {
    document.getElementById('localIP').textContent = data.ip || '--';
    document.getElementById('pinCode').textContent = data.pin || '----';
  });
  window.api.on('floatbar-visible-changed', (visible) => {
    document.getElementById('floatbarToggle').checked = visible;
  });
  window.api.on('dial-result', (data) => {
    addLog(data.status === 'ok' ? 'success' : 'error', data.number + ' ' + (data.status === 'ok' ? '✓' : '✗'));
  });
  // 手机不在线且双路唤醒都失败时的反馈
  window.api.on('dial-wake-failed', (data) => {
    if (_dialCountdownId) { clearInterval(_dialCountdownId); _dialCountdownId = null; }
    const btn = document.getElementById('callBtn');
    btn.style.pointerEvents = '';
    updateCallBtnText();
    addLog('error', '❌ 唤醒失败: ' + (data.reason || '云端未连接且设备不在局域网'));
    showToast('手机不在线且无法唤醒，请检查网络', 'error');
  });
  window.api.on('dial-waking', (data) => {
    addLog('info', '⏳ 正在唤醒手机(PIN=' + data.pin + ')...拨号排队中');
    if (data.number) showToast('正在唤醒手机，将自动拨号 ' + data.number);
    // 拨号按钮显示倒计时进度（使用模块级变量，避免 DOM 属性存储）
    const btn = document.getElementById('callBtn');
    btn.style.pointerEvents = 'none';
    let remaining = 30;
    if (_dialCountdownId) { clearInterval(_dialCountdownId); _dialCountdownId = null; }
    _dialCountdownId = setInterval(() => {
      remaining--;
      if (remaining <= 0 || !btn.style.pointerEvents) {
        clearInterval(_dialCountdownId);
        _dialCountdownId = null;
        return;
      }
      btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> 唤醒中 ' + remaining + 's';
    }, 1000);
    btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> 唤醒中 30s';
  });
  window.api.on('dial-timeout', (data) => {
    addLog('error', '❌ 拨号超时: ' + data.number + ' (30s未响应)');
    showToast('拨号超时，正在尝试云端恢复...', 'error');
    // 清除倒计时，恢复按钮
    if (_dialCountdownId) { clearInterval(_dialCountdownId); _dialCountdownId = null; }
    const btn = document.getElementById('callBtn');
    btn.style.pointerEvents = '';
    updateCallBtnText();
    window.api.send('dial-failed-trigger-recovery');
  });
  // 拨号成功时也清除倒计时
  window.api.on('dial-sent', (data) => {
    addLog('success', '📞 已发送: ' + data.number);
    if (data.phoneId) lastDialPin = data.phoneId;
    if (_dialCountdownId) { clearInterval(_dialCountdownId); _dialCountdownId = null; }
    const btn = document.getElementById('callBtn');
    btn.style.pointerEvents = '';
    // 短暂绿色闪烁反馈（使用硬编码值，CSS变量在inline style中不可靠）
    btn.style.background = 'linear-gradient(135deg, #16A34A, #15803D)';
    btn.style.boxShadow = '0 4px 20px rgba(34,197,94,0.45)';
    setTimeout(() => {
      btn.style.background = '';
      btn.style.boxShadow = '';
      updateCallBtnText();
    }, 1200);
  });
  document.getElementById('restartCloudIcon').addEventListener('click', () => {
    const icon = document.getElementById('restartCloudIcon');
    icon.classList.add('spinning');
    window.api.send('restart-cloud');
    setTimeout(() => icon.classList.remove('spinning'), 3000);
    addLog('info', '云端重连已触发');
  });
  document.getElementById('restartAppIcon').addEventListener('click', () => {
    if (confirm('确定要重启 AutoDial 吗？\n\n重启后会自动恢复，约需 3-5 秒。')) {
      window.api.send('restart-app');
    }
  });
  window.api.on('hangup-sent', () => { addLog('info', '已发送挂断'); });
  window.api.on('server-log', (data) => {
    const lvl = data.level === 'error' ? 'error' : data.level === 'warn' ? 'error' : 'info';
    addLog(lvl, '🖥 ' + data.text);
  });
  window.api.on('error', (data) => {
    showToast(data.message, 'error');
    addLog('error', data.message);
  });
}

function setPhoneConnected(connected, phoneIP) {
  isConnected = connected;
  const dot = document.getElementById('statusDot');
  const txt = document.getElementById('statusText');
  const banner = document.getElementById('banner');
  const callBtn = document.getElementById('callBtn');
  const hasNumber = document.getElementById('numberInput').value.trim();
  callBtn.disabled = connected && !hasNumber;
  document.getElementById('hangupBtn').disabled = !connected;
  if (connected) {
    dot.className = 'status-dot on';
    txt.textContent = phoneIP ? '已连接 · ' + phoneIP : '已连接';
    banner.className = 'banner show';
    setStatusBar('connected');
  } else {
    dot.className = 'status-dot';
    txt.textContent = '等待手机连接...';
    banner.className = 'banner';
    setStatusBar('');
  }
}

// ==================== 多手机选择器 ====================
function updatePhoneSelector(phones, activeId) {
  currentPhones = phones || [];
  currentActiveId = activeId;
  const selector = document.getElementById('phoneSelector');
  const list = document.getElementById('phoneList');
  const banner = document.getElementById('banner');
  const dot = document.getElementById('statusDot');
  const txt = document.getElementById('statusText');

  if (currentPhones.length === 0) {
    selector.className = 'phone-section';
    isConnected = false;
    dot.className = 'status-dot';
    txt.textContent = '等待手机连接...';
    banner.className = 'banner';
    setStatusBar('');
    // Bug9修复: 只有在有号码时才启用"重连手机"按钮，避免空号码时显示"重连手机"误导用户
    const hasNum = document.getElementById('numberInput').value.trim();
    document.getElementById('callBtn').disabled = !hasNum;
    document.getElementById('hangupBtn').disabled = true;
    updateCallBtnText(); updateHangupBtnText();
    return;
  }

  isConnected = true;
  dot.className = 'status-dot on';
  selector.className = 'phone-section show';
  setStatusBar('connected');

  if (currentPhones.length > 1) {
    banner.className = 'banner show';
    banner.innerHTML = '✅ ' + currentPhones.length + ' 部手机已连接';
  } else {
    banner.className = 'banner show';
    banner.innerHTML = '✅ 手机已连接，可以拨号';
  }

  const activePhone = currentPhones.find(p => p.id === activeId);
  if (activePhone) {
    const display = activePhone.note || activePhone.name;
    txt.textContent = '已连接 · ' + display;
  }

  list.innerHTML = '';
  currentPhones.forEach(phone => {
    const card = document.createElement('div');
    card.className = 'phone-card' + (phone.id === activeId ? ' active' : '');

    const dotEl = document.createElement('span');
    dotEl.className = 'phone-card-dot';
    card.appendChild(dotEl);

    const info = document.createElement('div');
    info.className = 'phone-card-info';

    const nameEl = document.createElement('div');
    nameEl.className = 'phone-card-name';
    nameEl.textContent = phone.note || phone.name;
    info.appendChild(nameEl);

    const meta = document.createElement('div');
    meta.className = 'phone-card-meta';
    if (phone.ip) {
      const ipSpan = document.createElement('span');
      ipSpan.textContent = phone.ip;
      meta.appendChild(ipSpan);
    }
    if (phone.note) {
      const hint = document.createElement('span');
      hint.style.color = 'var(--text2)';
      hint.textContent = '(' + phone.name + ')';
      meta.appendChild(hint);
    }
    // 连接类型徽章（使用 connectionType 字段，与 getDeviceList() 返回值对齐）
    const badge = document.createElement('span');
    const connType = phone.connectionType || (phone.isCloud ? 'cloud' : 'lan');
    const badgeClass = connType === 'lan+cloud' ? 'dual' : connType;
    badge.className = 'phone-badge ' + badgeClass;
    badge.textContent = connType === 'lan' ? 'LAN' : connType === 'cloud' ? '云端' : '双通道';
    meta.appendChild(badge);
    info.appendChild(meta);
    card.appendChild(info);

    const reconnectBtn = document.createElement('button');
    reconnectBtn.className = 'phone-reconnect-btn';
    reconnectBtn.title = '强制重连此手机';
    reconnectBtn.textContent = '↺';
    reconnectBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      if (reconnectBtn.classList.contains('spinning')) return;
      reconnectBtn.classList.add('spinning');
      reconnectBtn.textContent = '⏳';
      window.api.send('force-reconnect', phone.id);
    });
    card.appendChild(reconnectBtn);

    card.addEventListener('click', () => { window.api.send('select-phone', phone.id); });
    card.addEventListener('dblclick', (e) => { e.stopPropagation(); startRename(phone.id, phone.note || ''); });
    card.__phoneId = phone.id;
    list.appendChild(card);
  });

  const hasNumber = document.getElementById('numberInput').value.trim();
  document.getElementById('callBtn').disabled = isConnected && !hasNumber;
  document.getElementById('hangupBtn').disabled = !isConnected;
  updateCallBtnText(); updateHangupBtnText();
}

function startRename(phoneId, currentNote) {
  const list = document.getElementById('phoneList');
  const cards = list.querySelectorAll('.phone-card');
  cards.forEach(card => {
    if (card.__phoneId !== phoneId) return;
    const nameEl = card.querySelector('.phone-card-name');
    if (!nameEl) return;
    const input = document.createElement('input');
    input.className = 'phone-rename-input';
    input.value = currentNote;
    input.placeholder = '输入备注名';
    nameEl.replaceWith(input);
    input.focus(); input.select();
    const finish = () => {
      window.api.send('rename-phone', { id: phoneId, note: input.value.trim() });
    };
    input.addEventListener('blur', finish);
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
      if (e.key === 'Escape') { input.value = currentNote; input.blur(); }
    });
  });
}

// ==================== 拨号盘 ====================
function pressKey(key) {
  const inp = document.getElementById('numberInput');
  inp.value += key; inp.focus();
  inp.dispatchEvent(new Event('input'));
}
function deleteLast() {
  const inp = document.getElementById('numberInput');
  inp.value = inp.value.slice(0, -1);
  inp.dispatchEvent(new Event('input'));
}
function clearNumber() {
  document.getElementById('numberInput').value = '';
  document.getElementById('numberInput').dispatchEvent(new Event('input'));
}

function dial() {
  const number = document.getElementById('numberInput').value.trim().replace(/\s/g, '');
  if (!isConnected) {
    const targetPin = lastDialPin || activePin;
    if (!targetPin) { showToast('无可用手机', 'error'); return; }
    const btn = document.getElementById('callBtn');
    btn.innerHTML = '⏳ 正在唤醒手机...';
    btn.style.pointerEvents = 'none';
    // Bug8修复: 先发 force-reconnect，等手机上线后由 queueDial 自动补发拨号
    // 不在此处同时发 dial，避免手机还未连接时 dial 指令丢失
    window.api.send('force-reconnect', targetPin);
    addLog('info', '唤醒手机 (PIN=' + targetPin + ')...');
    // 如果有号码，加入待发队列（通过 IPC dial 触发 queueDial）
    if (number) window.api.send('dial', number);
    return;
  }
  if (!number) { showToast('请输入号码', 'error'); return; }
  lastDialPin = activePin;
  window.api.send('dial', number);
  addLog('info', '发送拨号: ' + number);
}
function hangup() {
  if (!isConnected) { showToast('手机未连接', 'error'); return; }
  window.api.send('hangup');
  addLog('info', '发送挂断');
  showToast('已发送挂断指令');
}

// ==================== 剪贴板 ====================
function extractPhone(text) {
  // Bug26修复: 支持带空格/连字符的手机号，如 "138 0013 8000" 或 "138-0013-8000"
  const m = text.match(/1[3-9]\d[\s\-]?\d{4}[\s\-]?\d{4}|0\d{2,3}[-\s]?\d{7,8}/);
  return m ? m[0].replace(/[-\s]/g, '') : null;
}
function pollClipboard() {
  window.api.invoke('read-clipboard').then(d => {
    if (d.text && d.text !== lastClipboard) {
      lastClipboard = d.text;
      const phone = extractPhone(d.text);
      if (phone) {
        const inp = document.getElementById('numberInput');
        // Bug5修复: 如果用户正在输入（input 有焦点），不覆盖用户输入
        if (document.activeElement === inp) return;
        inp.value = phone;
        const hint = document.getElementById('clipHint');
        hint.classList.add('flash');
        setTimeout(() => hint.classList.remove('flash'), 500);
        inp.dispatchEvent(new Event('input'));
      }
    }
  }).catch(() => {}).finally(() => {
    clipboardTimer = setTimeout(pollClipboard, 1000);
  });
}

// ==================== 日志 ====================
function toggleLog() {
  logOpen = !logOpen;
  document.getElementById('logToggle').classList.toggle('open', logOpen);
  document.getElementById('logBody').classList.toggle('open', logOpen);
}
function addLog(type, msg) {
  const body = document.getElementById('logBody');
  const now = new Date();
  const t = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0') + ':' + String(now.getSeconds()).padStart(2,'0');
  const el = document.createElement('div');
  el.className = 'log-entry ' + type;
  el.innerHTML = '<span class="lt">' + t + '</span><span class="lm">' + msg + '</span>';
  body.appendChild(el);
  body.scrollTop = body.scrollHeight;
  while (body.children.length > 80) body.removeChild(body.firstChild);
  if (!logOpen) { logOpen = true; document.getElementById('logToggle').classList.add('open'); body.classList.add('open'); }
}

let toastTimer = null;
function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show ' + (type || '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.className = 'toast'; }, 2500);
}

// 键盘快捷键
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') dial();
  if (e.key === 'Backspace' && document.activeElement.id !== 'numberInput') deleteLast();
});

// ==================== 主界面快捷短信模板 ====================
const INDEX_TPL_KEY = 'autodial_sms_templates';
const INDEX_TPL_DEFAULTS = [
  { id: 1, title: '回访问候', content: '您好，我是之前联系过您的客服，请问您对我们产品还有什么疑问吗？' },
  { id: 2, title: '催办提醒', content: '您好，温馨提醒您，您的业务办理进度已更新，请及时查看。' },
  { id: 3, title: '会议通知', content: '您好，我们将于明天上午10点召开线上会议，届时请准时参加。' },
  { id: 4, title: '感谢回复', content: '感谢您的咨询与支持，如有其他问题随时联系我们，祝您生活愉快！' },
  { id: 5, title: '节日祝福', content: '值此佳节来临之际，祝您及家人节日快乐，万事如意！' }
];
function indexLoadTemplates() {
  try { const raw = localStorage.getItem(INDEX_TPL_KEY); if (raw) return JSON.parse(raw); } catch (e) {}
  return JSON.parse(JSON.stringify(INDEX_TPL_DEFAULTS));
}
function renderIndexTemplates() {
  const templates = indexLoadTemplates();
  const container = document.getElementById('indexTplList');
  container.innerHTML = '';
  templates.forEach(tpl => {
    const tag = document.createElement('div');
    tag.className = 'index-tpl-tag';
    tag.textContent = tpl.title;
    tag.title = tpl.content;
    tag.addEventListener('click', () => {
      const number = document.getElementById('numberInput').value.trim().replace(/\s/g, '');
      window.api.send('open-sms', { number: number || '', content: tpl.content });
    });
    container.appendChild(tag);
  });
}

if (typeof ThemeEngine !== 'undefined') ThemeEngine.initTheme();
renderIndexTemplates();
init();
</script>
