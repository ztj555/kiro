<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoDial 设置</title>
<style>
:root {
  --gold: #C9A84C;
  --gold-light: #F0C040;
  --gold-dark: #8B6914;
  --bg: #0D0F14;
  --bg2: #161920;
  --bg3: #1E2128;
  --text: #E8DCC8;
  --text2: #A09070;
  --green: #22C55E;
  --red: #EF4444;
  --blue: #4F8EF7;
  --blue-dark: #2563EB;
  --blue-glow: var(--blue-30);
  --surface: #161920;
  --surface2: #1E2128;
  --border: rgba(255,255,255,0.08);
  --border-active: var(--blue-40);
  --radius-sm: 6px;
  --radius-md: 12px;
  --radius-lg: 24px;
  --shadow: none;
  --font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
  --gradient-green: linear-gradient(135deg, #16A34A, #15803D);
  --gradient-red: linear-gradient(135deg, #DC2626, #B91C1C);
  --gradient-blue: linear-gradient(135deg, #4F8EF7, #2563EB);
  --glow-text: none;
  --floatbar-bg: rgba(22,25,32,0.85);
  --floatbar-border: var(--blue-25);
  --floatbar-blur: blur(20px);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-family);
  overflow: hidden;
  user-select: none;
}
.wrap { width: 100%; height: 100%; display: flex; flex-direction: column; }

/* 标题栏 */
.titlebar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  flex-shrink: 0;
  -webkit-app-region: drag;
  height: 36px;
  padding: 0 12px;
}
.titlebar .logo {
  font-size: 13px;
  font-weight: 700;
  color: var(--blue);
  letter-spacing: 1px;
  display: flex;
  align-items: center;
  gap: 7px;
}
.logo-icon {
  width: 20px; height: 20px;
  background: var(--gradient-blue);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px;
  box-shadow: 0 0 8px var(--blue-glow);
}
.titlebar-btns {
  display: flex;
  margin-left: auto;
  height: 100%;
  -webkit-app-region: no-drag;
}
.titlebar-btn {
  width: 36px; height: 36px;
  background: none; border: none;
  color: var(--text2);
  font-size: 10px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s, color 0.15s;
}
.titlebar-btn:hover { background: rgba(255,255,255,0.07); color: var(--text); }
.titlebar-btn.close:hover { background: #C42B1C; color: white; }
</style>

<style>
/* 内容 */
.content {
  flex: 1;
  padding: 12px;
  overflow-y: auto;
}
.content::-webkit-scrollbar { width: 3px; }
.content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* 分组标题 */
.section-title {
  font-size: 10px;
  color: var(--text2);
  letter-spacing: 1.2px;
  text-transform: uppercase;
  margin-bottom: 8px;
  padding-bottom: 5px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 6px;
}
.section-title svg { opacity: 0.6; }

/* 设置卡片 */
.setting-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  margin-bottom: 6px;
  overflow: hidden;
  transition: border-color 0.2s;
}
.setting-card:hover { border-color: var(--blue-20); }

.setting-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 12px;
  transition: background 0.15s;
}
.setting-item + .setting-item { border-top: 1px solid var(--border); }
.setting-item:hover { background: rgba(255,255,255,0.02); }
.setting-item.column { flex-direction: column; align-items: flex-start; }

.setting-icon {
  width: 28px; height: 28px;
  background: var(--surface2);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  margin-right: 10px;
  font-size: 13px;
}
.setting-info { flex: 1; display: flex; align-items: center; }
.setting-text { flex: 1; }
.setting-label { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 1px; }
.setting-desc { font-size: 10px; color: var(--text2); line-height: 1.4; }

/* 开关 */
.switch { display: flex; align-items: center; gap: 4px; cursor: pointer; flex-shrink: 0; margin-left: 12px; }
.switch input { display: none; }
.switch .sw-track {
  width: 34px; height: 18px;
  background: var(--surface2);
  border-radius: 9px;
  position: relative;
  transition: background 0.2s;
  border: 1px solid var(--border);
}
.switch .sw-track::after {
  content: '';
  position: absolute;
  top: 2px; left: 2px;
  width: 12px; height: 12px;
  border-radius: 50%;
  background: var(--text2);
  transition: all 0.2s;
}
.switch input:checked + .sw-track { background: var(--blue-dark); border-color: var(--blue); }
.switch input:checked + .sw-track::after { left: 18px; background: white; }

/* 选择组 */
.select-group {
  display: flex;
  gap: 4px;
  flex-shrink: 0;
  margin-left: 12px;
  flex-wrap: wrap;
  justify-content: flex-end;
}
.select-option {
  padding: 4px 10px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 20px;
  font-size: 11px;
  color: var(--text2);
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.select-option:hover { border-color: var(--blue-40); color: var(--text); }
.select-option.active {
  background: var(--blue-15);
  border-color: var(--blue);
  color: var(--blue);
  font-weight: 600;
}

.spacer { height: 12px; }

/* 云服务器内嵌区 */
.cloud-inline {
  padding: 0 12px 10px;
  border-top: 1px solid var(--border);
}
.cloud-summary {
  font-size: 12px;
  color: var(--blue);
  margin: 8px 0 4px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.cloud-status-text { font-size: 11px; color: var(--text2); margin-bottom: 8px; }
.cloud-actions { display: flex; gap: 6px; }
.btn-cloud {
  flex: 1;
  padding: 7px 10px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-size: 12px;
  cursor: pointer;
  transition: all 0.15s;
  text-align: center;
}
.btn-cloud:hover { border-color: var(--blue-40); color: var(--blue); background: var(--blue-08); }
.btn-cloud.primary { background: var(--blue-15); border-color: var(--blue); color: var(--blue); font-weight: 600; }
.btn-cloud.primary:hover { background: var(--blue-25); }

/* 主题选择器 */
.theme-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 7px;
  margin-top: 10px;
  width: 100%;
}
.theme-card {
  cursor: pointer;
  text-align: center;
  transition: transform 0.15s;
  padding: 3px;
}
.theme-card:hover { transform: scale(1.06); }
.theme-card.active { transform: scale(1.06); }
.theme-preview {
  width: 100%;
  height: 28px;
  border-radius: 6px;
  border: 2px solid transparent;
  overflow: hidden;
  display: flex;
  margin-bottom: 4px;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.theme-preview > span { flex: 1; height: 100%; }
.theme-card.active .theme-preview {
  border-color: var(--blue);
  box-shadow: 0 0 8px var(--blue-40);
}
.theme-name { font-size: 9px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.2; }

/* 模式选择 */
.mode-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid var(--border);
  flex-wrap: wrap;
  gap: 8px;
}
.mode-row .setting-label { font-size: 12px; margin-bottom: 0; }
.mode-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 4px;
  width: 100%;
  margin-top: 6px;
}
.mode-grid .select-option { text-align: center; margin-left: 0; font-size: 10px; padding: 3px 6px; }

.footer {
  text-align: center;
  padding: 8px;
  font-size: 10px;
  color: var(--text2);
  flex-shrink: 0;
  border-top: 1px solid var(--border);
}
</style>
<script src="../themes/theme-data.js"></script>
<script src="js/theme.js"></script>
</head>
<body>
<div class="wrap">
  <div class="titlebar">
    <div class="logo">
      <div class="logo-icon">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>

    </div>

        <svg width="10" height="10" viewBox="0 0 10 10"><line x1="0" y1="0" x2="10" y2="10" stroke="currentColor" stroke-width="1.2"/><line x1="10" y1="0" x2="0" y2="10" stroke="currentColor" stroke-width="1.2"/></svg>
      </button>
    </div>

  <div class="content">

    <div class="section-title">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
      窗口行为
    </div>
    <div class="setting-card">
      <div class="setting-item">
        <div class="setting-info">
          <div class="setting-icon">🪟</div>
          <div class="setting-text">

    </div>
    <div class="setting-card">

    <div class="section-title">

<script>
if (typeof ThemeEngine !== 'undefined') ThemeEngine.initTheme();

document.getElementById('btnClose').addEventListener('click', () => {
  window.api.send('close-settings');
});

// ==================== 主题选择器 ====================
let currentTheme = 'dark-gold';
let currentMode = 'dark';

function renderThemeCards() {
  const grid = document.getElementById('themeGrid');
  grid.innerHTML = '';
  THEME_DATA.forEach(t => {
    const card = document.createElement('div');
    card.className = 'theme-card';
    card.dataset.id = t.id;
    const preview = t.dark;
    card.innerHTML =
      '<div class="theme-preview">' +
        '<span style="background:' + preview.gold + '"></span>' +
        '<span style="background:' + preview.bg + '"></span>' +
        '<span style="background:' + preview.bg2 + '"></span>' +
        '<span style="background:' + preview.text + '"></span>' +
      '</div>' +
      '<div class="theme-name">' + t.name + '</div>';
    card.addEventListener('click', () => selectTheme(t.id));
    grid.appendChild(card);
  });
}

function selectTheme(id) {
  currentTheme = id;
  document.querySelectorAll('.theme-card').forEach(c =>
    c.classList.toggle('active', c.dataset.id === id)
  );
  window.api.send('change-theme', { id: id });
  if (typeof ThemeEngine !== 'undefined') ThemeEngine.applyTheme(id, currentMode);
}

document.querySelectorAll('#modeSelect .select-option').forEach(opt => {
  opt.addEventListener('click', () => {
    document.querySelectorAll('#modeSelect .select-option').forEach(o => o.classList.remove('active'));
    opt.classList.add('active');
    currentMode = opt.dataset.value;
    window.api.send('change-theme', { id: currentTheme, mode: currentMode });
    if (typeof ThemeEngine !== 'undefined') ThemeEngine.applyTheme(currentTheme, currentMode);
  });
});

// ==================== 云服务器管理 ====================
let cloudServers = [];

function stripCloudPrefix(val) {
  if (val.startsWith('ws://')) return val.substring(5);
  if (val.startsWith('wss://')) return val.substring(6);
  return val;
}

function updateCloudSummary() {
  const el = document.getElementById('cloudServerSummary');
  if (cloudServers.length === 0) {
    el.textContent = '未配置服务器';
    el.style.color = 'var(--text2)';
  } else {
    el.textContent = '✓ ' + cloudServers.length + ' 台服务器 · ' + stripCloudPrefix(cloudServers[0]);
    el.style.color = 'var(--blue)';
  }
}

function saveCloudServers(servers) {
  const seen = new Set();
  cloudServers = servers.filter(s => {
    const key = stripCloudPrefix(s);
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  });
  updateCloudSummary();
  const enabled = document.getElementById('cloudEnabled').checked;
  window.api.send('update-cloud-config', { enabled, servers: cloudServers });
}

function renderServerList() {
  const container = document.getElementById('serverList');
  container.innerHTML = '';
  if (cloudServers.length === 0) {
    container.innerHTML = '<div style="text-align:center;color:var(--text2);padding:20px;font-size:13px;">暂无服务器，点击下方添加</div>';
    return;
  }
  cloudServers.forEach((addr, index) => {
    const row = document.createElement('div');
    row.style.cssText = 'display:flex;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);gap:8px;';
    const idx = document.createElement('span');
    idx.textContent = index === 0 ? '①' : '②';
    idx.style.cssText = 'font-size:13px;min-width:20px;color:' + (index === 0 ? 'var(--blue)' : 'var(--text2)') + ';';
    const addrEl = document.createElement('span');
    addrEl.textContent = stripCloudPrefix(addr);
    addrEl.style.cssText = 'flex:1;font-size:12px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;';
    const connBtn = document.createElement('button');
    connBtn.textContent = '连接';
    connBtn.style.cssText = 'padding:3px 9px;background:var(--blue-15);color:var(--blue);border:1px solid var(--blue);border-radius:var(--radius-sm);cursor:pointer;font-size:11px;';
    connBtn.addEventListener('click', () => {
      window.api.send('connect-cloud-specific', addr);
      document.getElementById('cloudStatus').textContent = '正在连接 ' + stripCloudPrefix(addr) + ' ...';
      document.getElementById('cloudStatus').style.color = 'var(--blue)';
      document.getElementById('serverModal').style.display = 'none';
    });
    row.appendChild(idx);
    row.appendChild(addrEl);
    if (index > 0) {
      const upBtn = document.createElement('span');
      upBtn.textContent = '↑';
      upBtn.style.cssText = 'cursor:pointer;color:var(--text2);font-size:15px;padding:0 3px;';
      upBtn.addEventListener('click', () => {
        cloudServers.splice(index, 1);
        cloudServers.splice(index - 1, 0, addr);
        saveCloudServers(cloudServers);
        renderServerList();
      });
      row.appendChild(upBtn);
    }
    row.appendChild(connBtn);
    const delBtn = document.createElement('span');
    delBtn.textContent = '✕';
    delBtn.style.cssText = 'cursor:pointer;color:var(--red);font-size:13px;padding:0 3px;';
    delBtn.addEventListener('click', () => {
      cloudServers.splice(index, 1);
      saveCloudServers(cloudServers);
      renderServerList();
    });
    row.appendChild(delBtn);
    container.appendChild(row);
  });
}

document.getElementById('btnManageServers').addEventListener('click', () => {
  renderServerList();
  document.getElementById('serverModal').style.display = 'flex';
});
document.getElementById('btnCloseModal').addEventListener('click', () => {
  document.getElementById('serverModal').style.display = 'none';
});
document.getElementById('btnAddServer').addEventListener('click', () => {
  const input = document.createElement('input');
  input.type = 'text';
  input.placeholder = '如: 1.2.3.4:35430';
  input.style.cssText = 'width:100%;padding:7px 10px;background:var(--bg);border:1px solid var(--border-active);border-radius:var(--radius-sm);color:var(--text);font-size:12px;outline:none;margin-bottom:8px;';
  const listEl = document.getElementById('serverList');
  listEl.insertBefore(input, listEl.firstChild);
  input.focus();
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      const val = input.value.trim();
      const normalizedVal = stripCloudPrefix(val);
      const exists = cloudServers.some(s => stripCloudPrefix(s) === normalizedVal);
      if (val && !exists) {
        cloudServers.push(val);
        saveCloudServers(cloudServers);
        renderServerList();
      } else if (exists) {
        input.style.borderColor = 'var(--red)';
        setTimeout(() => { input.style.borderColor = 'var(--border-active)'; }, 1000);
      }
    }
  });
});

document.getElementById('btnTestServers').addEventListener('click', async () => {
  if (cloudServers.length === 0) return;
  const modal = document.getElementById('testModal');
  const resultsEl = document.getElementById('testResults');
  const titleEl = document.getElementById('testTitle');
  modal.style.display = 'flex';
  titleEl.textContent = '正在测试...';
  const results = await window.api.invoke('test-cloud-servers', cloudServers);
  resultsEl.innerHTML = '';
  results.forEach((r, i) => {
    const row = document.createElement('div');
    row.style.cssText = 'padding:6px 0;font-size:12px;color:' + (r.ok ? 'var(--green)' : 'var(--red)') + ';';
    row.textContent = (i + 1) + '. ' + stripCloudPrefix(r.addr) + '  ' + (r.ok ? '✅ ' + r.ms + 'ms' : '❌ ' + (r.error || '不可连接'));
    resultsEl.appendChild(row);
  });
  titleEl.textContent = '测试完成';
});
document.getElementById('btnCloseTest').addEventListener('click', () => {
  document.getElementById('testModal').style.display = 'none';
});

// ==================== 加载设置 ====================
async function loadSettings() {
  try {
    const s = await window.api.invoke('get-settings') || {};
    document.querySelectorAll('#closeAction .select-option').forEach(opt => {
      opt.classList.toggle('active', opt.dataset.value === (s.closeAction || 'minimize'));
    });
    document.getElementById('trayExit').checked = s.trayExit !== false;
    document.getElementById('autoStart').checked = s.autoStart || false;
    document.getElementById('silentStart').checked = s.silentStart || false;
    document.getElementById('cloudEnabled').checked = s.cloudEnabled || false;
    cloudServers = Array.isArray(s.cloudServers) ? s.cloudServers : (s.cloudServer ? [s.cloudServer] : []);
    updateCloudSummary();
    document.getElementById('cloudServerSection').style.opacity = (s.cloudEnabled ? '1' : '0.5');
    currentTheme = s.theme || 'dark-gold';
    currentMode = s.mode || 'dark';
    const modeCompat = { 'auto': 'dawn' };
    if (modeCompat[currentMode]) { currentMode = modeCompat[currentMode]; saveSetting('mode', currentMode); }
    document.querySelectorAll('.theme-card').forEach(c => c.classList.toggle('active', c.dataset.id === currentTheme));
    document.querySelectorAll('#modeSelect .select-option').forEach(o => o.classList.toggle('active', o.dataset.value === currentMode));
  } catch (e) {}
}

function saveSetting(key, value) { window.api.send('save-setting', { key, value }); }

document.querySelectorAll('#closeAction .select-option').forEach(opt => {
  opt.addEventListener('click', () => {
    document.querySelectorAll('#closeAction .select-option').forEach(o => o.classList.remove('active'));
    opt.classList.add('active');
    saveSetting('closeAction', opt.dataset.value);
  });
});
document.getElementById('trayExit').addEventListener('change', function() { saveSetting('trayExit', this.checked); });
document.getElementById('autoStart').addEventListener('change', function() {
  saveSetting('autoStart', this.checked);
  window.api.send('set-auto-start', this.checked);
});
document.getElementById('silentStart').addEventListener('change', function() { saveSetting('silentStart', this.checked); });
document.getElementById('cloudEnabled').addEventListener('change', function() {
  const enabled = this.checked;
  // Bug11修复: saveCloudServers 内部已发送 update-cloud-config，不再重复发送
  saveCloudServers(cloudServers);
  document.getElementById('cloudServerSection').style.opacity = enabled ? '1' : '0.5';
  if (enabled && cloudServers.length === 0) {
    document.getElementById('cloudStatus').textContent = '请先添加云服务器地址';
    document.getElementById('cloudStatus').style.color = 'var(--red)';
  }
});

if (typeof window !== 'undefined' && window.api) {
  window.api.on('cloud-status', (data) => {
    const statusEl = document.getElementById('cloudStatus');
    if (!statusEl) return;
    if (data.connected) {
      statusEl.textContent = '✅ 已连接: ' + stripCloudPrefix(data.server || '');
      statusEl.style.color = 'var(--green)';
    } else if (data.enabled && data.servers && data.servers.length > 0) {
      statusEl.textContent = '遍历连接中...';
      statusEl.style.color = 'var(--gold)';
    } else {
      statusEl.textContent = '';
    }
    if (data.servers && data.servers.length > 0) {
      cloudServers = data.servers;
      updateCloudSummary();
    }
  });
  window.api.on('theme-changed', (data) => {
    currentTheme = data.theme || data.id;
    currentMode = data.mode;
    document.querySelectorAll('.theme-card').forEach(c => c.classList.toggle('active', c.dataset.id === currentTheme));
    document.querySelectorAll('#modeSelect .select-option').forEach(o => o.classList.toggle('active', o.dataset.value === currentMode));
  });
}

renderThemeCards();
loadSettings();
</script>

<script>
document.getElementById('btnFetchServers')?.addEventListener('click', async () => {
  const sources = [
    { name: 'GitHub', url: 'https://gist.githubusercontent.com/ztj555/cb6a6bb0ddbe3d4e651d5bb3411777d5/raw/AutoDialservers.txt' },
    { name: '码云', url: 'https://gitee.com/zuo-tingjun/AutoDialserverslist/raw/master/servers.txt' }
  ];
  const allServers = new Set();
  const results = [];
  for (const src of sources) {
    try {
      const res = await Promise.race([
        fetch(src.url),
        new Promise((_, reject) => setTimeout(() => reject(new Error('超时')), 5000))
      ]);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const text = await res.text();
      const servers = text.trim().split('\n').map(line => line.trim()).filter(line => line && !line.startsWith('#'));
      servers.forEach(s => allServers.add(s));
      results.push('✅ ' + src.name + '：获取 ' + servers.length + ' 个');
    } catch (e) {
      results.push('❌ ' + src.name + '：' + e.message);
    }
  }
  if (allServers.size === 0) { alert('所有来源都获取失败：\n' + results.join('\n')); return; }
  let addedCount = 0;
  allServers.forEach(server => {
    const normalized = stripCloudPrefix(server);
    const exists = cloudServers.some(s => stripCloudPrefix(s) === normalized);
    if (!exists) { cloudServers.push(server); addedCount++; }
  });
  saveCloudServers(cloudServers);
  alert('获取完成（已自动去重）：\n' + results.join('\n') + '\n\n新增 ' + addedCount + ' 个服务器（总计 ' + cloudServers.length + ' 个）');
  renderServerList();
  updateCloudSummary();
});
</script>
